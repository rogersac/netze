<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Internet Health HUD</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app" class="app">
    <div id="dashboard" class="dashboard">
      <div class="status-panel">
        <button id="openControlsButton" class="status-controls-button" type="button" aria-label="Open controls">
          <svg class="status-controls-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M19.14 12.94c.04-.31.06-.62.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .12-.64l-1.92-3.32a.5.5 0 0 0-.6-.22l-2.39.96a7.07 7.07 0 0 0-1.63-.94l-.36-2.54a.5.5 0 0 0-.49-.42h-3.84a.5.5 0 0 0-.49.42l-.36 2.54c-.58.23-1.12.54-1.63.94l-2.39-.96a.5.5 0 0 0-.6.22L2.71 8.84a.5.5 0 0 0 .12.64l2.03 1.58c-.04.31-.06.62-.06.94s.02.63.06.94l-2.03 1.58a.5.5 0 0 0-.12.64l1.92 3.32a.5.5 0 0 0 .6.22l2.39-.96c.5.39 1.05.71 1.63.94l.36 2.54a.5.5 0 0 0 .49.42h3.84a.5.5 0 0 0 .49-.42l.36-2.54c.58-.23 1.12-.54 1.63-.94l2.39.96a.5.5 0 0 0 .6-.22l1.92-3.32a.5.5 0 0 0-.12-.64zm-7.14 2.56A3.5 3.5 0 1 1 12 8.5a3.5 3.5 0 0 1 0 7z"></path>
          </svg>
        </button>
        <div class="status-label">SYSTEM HEALTH</div>
        <div id="overallStatus" class="overall-status status-checking">CHECKING...</div>
        <div id="statusSummary" class="status-summary">Preparing network checks</div>
        <div class="meta-grid">
          <div class="meta-card">
            <div class="meta-label">LAST CHECK</div>
            <div id="lastChecked" class="meta-value">--:--:--</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">AUTO REFRESH</div>
            <div id="refreshState" class="meta-value">30s</div>
          </div>
          <div class="meta-card">
            <div class="meta-label">STABLE FOR</div>
            <div id="uptimeValue" class="meta-value">--:--:--</div>
          </div>
          <button id="incidentSummaryButton" class="meta-card meta-card-button" type="button">
            <div class="meta-label">RECENT INCIDENTS</div>
            <div id="incidentCountValue" class="meta-value">0 / 200</div>
          </button>
        </div>
      </div>

      <div id="detailsPanel" class="details-panel">
        <div class="details-header-row">
          <div class="details-title-group">
            <div id="detailsHeader" class="details-header">ENDPOINT STATUS</div>
            <div id="detailsCount" class="details-count">0 configured</div>
          </div>
          <div class="details-tabs" role="tablist" aria-label="Details view">
            <button id="showEndpointsTabButton" class="details-tab-button active" type="button" role="tab" aria-selected="true">Endpoints</button>
            <button id="showIncidentsTabButton" class="details-tab-button" type="button" role="tab" aria-selected="false">Incidents</button>
          </div>
        </div>
        <div id="endpointScroll" class="endpoint-scroll">
          <div id="endpointList" class="endpoint-list"></div>
        </div>
        <div id="incidentPanel" class="incident-panel">
          <div class="incident-filters">
            <div class="incident-filter-toggle-group">
              <label class="incident-filter-toggle">
                <input id="filterFailCheckbox" class="incident-filter-checkbox" type="checkbox" checked>
                <span>Failed</span>
              </label>
              <label class="incident-filter-toggle">
                <input id="filterSlowCheckbox" class="incident-filter-checkbox" type="checkbox" checked>
                <span>Slow</span>
              </label>
            </div>
            <label class="control-field control-field-inline incident-filter-select">
              <span>Endpoint</span>
              <select id="incidentEndpointFilter" class="control-select">
                <option value="all">All endpoints</option>
              </select>
            </label>
          </div>
          <div id="incidentScroll" class="incident-scroll">
            <div id="incidentList" class="incident-list"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="app-footer">
      <div class="app-credit">
        Created by
        <a class="app-credit-link" href="https://github.com/rogersac/netze" target="_blank" rel="noopener noreferrer">Chet Rogers</a>
      </div>
    </div>

    <div id="controlsModal" class="controls-modal">
      <div id="controlsBackdrop" class="controls-backdrop"></div>
      <div id="controlsDialog" class="controls-dialog" role="dialog" aria-modal="true" aria-label="Controls">
        <div class="controls-header">
          <div class="controls-title-group">
            <div class="controls-title">Controls</div>
            <div id="controlsSubtitle" class="controls-subtitle">Up to 10 endpoints</div>
          </div>
          <button id="closeControlsButton" class="control-button control-close-button" type="button" aria-label="Close controls">X</button>
        </div>

        <div class="controls-row">
          <button id="refreshNowButton" class="control-button" type="button">Refresh Now</button>
          <button id="toggleAutoButton" class="control-button" type="button">Auto: On</button>
          <button id="toggleDetailsButton" class="control-button" type="button">Details: On</button>
          <button id="showHistoryButton" class="control-button" type="button">History</button>
          <label class="control-field control-field-inline">
            <span>Refresh Interval</span>
            <select id="intervalSelect" class="control-select">
              <option value="15000">15 seconds</option>
              <option value="30000">30 seconds</option>
              <option value="60000">60 seconds</option>
            </select>
          </label>
        </div>

        <div class="controls-section">
          <div class="controls-section-header">
            <div class="controls-section-title">Endpoints</div>
            <button id="addEndpointButton" class="control-button control-button-small" type="button">Add Endpoint</button>
          </div>
          <div id="endpointEditorScroll" class="endpoint-editor-scroll">
            <div id="endpointEditorList" class="endpoint-editor-list"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
